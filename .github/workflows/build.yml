name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build-android:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [Android64, Android32]

    env:
      GEODE_VERSION: "5.8.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate mod.json from template
        run: |
          export GEODE_VERSION="${{ env.GEODE_VERSION }}"
          export MOD_ID="frostre1997.click-beyond-frames"
          export MOD_NAME="Click Beyond Frames"
          export MOD_VERSION="v1.0.0"
          export MOD_DEVELOPER="frostre1997"
          export MOD_DESCRIPTION="Removes the 480 TPS cap from RobTop's official CBF for unlimited input precision on Android."
          envsubst < mod.json.template > mod.json

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.target }}
          build-config: Release
          android-ndk-version: 28
          build-args: |
            -DCMAKE_CXX_STANDARD=20
            -DCMAKE_CXX_STANDARD_REQUIRED=ON
            -DCMAKE_CXX_EXTENSIONS=ON
            -DCMAKE_CXX_FLAGS="-std=gnu++20 -D_LIBCPP_STD_VER=20"
            -DGEODE_UNITY_BUILD=OFF

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.target }}
          path: build/${{ matrix.target }}/*.geode

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine .geode files
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-Combined
          path: ${{ steps.combine.outputs.build-output }}
