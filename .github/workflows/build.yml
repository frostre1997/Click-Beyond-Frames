name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build-android:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [android64, android32]

    env:
      GEODE_SDK: ${{ github.workspace }}/geode-sdk
      CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm-cache
      GEODE_VERSION: "5.8.1"
      ANDROID_NDK: ${{ github.workspace }}/android-ndk-r28

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Setup dummy Geode profile
        run: |
          mkdir -p dummy_profile
          geode profile add --name dummy dummy_profile/GeometryDash.exe win

      - name: Install Geode SDK (${{ env.GEODE_VERSION }})
        run: |
          geode sdk install "$GEODE_SDK"
          geode sdk update ${{ env.GEODE_VERSION }}
          geode sdk install-binaries --platform android64 --version ${{ env.GEODE_VERSION }}
          geode sdk install-binaries --platform android32 --version ${{ env.GEODE_VERSION }}

      - name: Download Android NDK r28 (Clang 19+)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip -d ${{ github.workspace }}
          echo "ANDROID_NDK=${{ github.workspace }}/android-ndk-r28" >> $GITHUB_ENV

      - name: Patch nontype_functional in CPM cache
        run: |
          # Remove any previously cached version to force fresh clone
          rm -rf $CPM_SOURCE_CACHE/nontype_functional

          # Clone the specific commit used by the build (aaa0)
          mkdir -p $CPM_SOURCE_CACHE/nontype_functional
          git clone https://github.com/zhihaoy/nontype_functional $CPM_SOURCE_CACHE/nontype_functional/aaa0

          # Apply the patch: replace variable template with class trait
          cd $CPM_SOURCE_CACHE/nontype_functional/aaa0
          sed -i 's/std::is_trivially_default_constructible_v<D>/std::is_trivially_default_constructible<D>::value/g' include/std23/move_only_function.h
          # Also patch any other occurrences (just in case)
          sed -i 's/std::is_trivially_default_constructible_v<[^>]*>/std::is_trivially_default_constructible<\1>::value/g' include/std23/move_only_function.h || true

      - name: Generate mod.json from template
        run: |
          export GEODE_VERSION="${{ env.GEODE_VERSION }}"
          export MOD_ID="frostre1997.click-beyond-frames"
          export MOD_NAME="Click Beyond Frames"
          export MOD_VERSION="v1.0.0"
          export MOD_DEVELOPER="frostre1997"
          export MOD_DESCRIPTION="Removes the 480 TPS cap from RobTop's official CBF for unlimited input precision on Android."
          envsubst < mod.json.template > mod.json

      - name: Check API submodule
        run: ls -la api/include/ClickBeyondFrames/
      
      - name: Build mod
        run: |
          geode build -p ${{ matrix.platform }} \
            --config Release \
            --ndk "$ANDROID_NDK" \
            -- \
            -DGEODE_UNITY_BUILD=OFF
        env:
          GEODE_BINARY_DIR: ${{ env.GEODE_SDK }}/bin/${{ env.GEODE_VERSION }}

      - name: Upload artifact (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/*.geode

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    env:
      GEODE_SDK: ${{ github.workspace }}/geode-sdk
      GEODE_VERSION: "5.8.1"

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Setup dummy Geode profile
        run: |
          mkdir -p dummy_profile
          geode profile add --name dummy dummy_profile/GeometryDash.exe win

      - name: Install Geode SDK (${{ env.GEODE_VERSION }})
        run: |
          geode sdk install "$GEODE_SDK"
          geode sdk update ${{ env.GEODE_VERSION }}
          geode sdk install-binaries --platform android64 --version ${{ env.GEODE_VERSION }}
          geode sdk install-binaries --platform android32 --version ${{ env.GEODE_VERSION }}

      - name: Combine .geode files
        run: |
          mkdir combined
          geode combine artifacts/ClickBeyondFrames-android64/*.geode artifacts/ClickBeyondFrames-android32/*.geode -o combined/frostre1997.ClickBeyondFrames.geode
        env:
          GEODE_BINARY_DIR: ${{ env.GEODE_SDK }}/bin/${{ env.GEODE_VERSION }}

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frostre1997.ClickBeyondFrames
          path: combined/frostre1997.ClickBeyondFrames.geode
