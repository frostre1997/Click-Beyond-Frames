name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]  # 64-bit and 32-bit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: android
          build-args: --abi ${{ matrix.abi }}
          # Optional: build-config: 'Release' or 'RelWithDebInfo'

      - name: Upload artifact (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.abi }}
          path: ${{ steps.build.outputs.build-output }}

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    steps:
      - name: Combine .geode files
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-Combined
          path: ${{ steps.combine.outputs.build-output }}
