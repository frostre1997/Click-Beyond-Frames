name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [Android64, Android32]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Install Geode SDK
        run: |
          geode sdk install
          geode sdk install-binaries --platform android

      - name: Build mod
        run: |
          geode build --target ${{ matrix.target }} --config Release
        env:
          GEODE_SDK: ${{ env.GEODE_SDK }}
          CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm-cache

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.target }}
          path: build/${{ matrix.target }}/*.geode

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine .geode files
        run: |
          mkdir combined
          # The combine tool is included with Geode CLI
          geode combine artifacts/ClickBeyondFrames-Android64/*.geode artifacts/ClickBeyondFrames-Android32/*.geode -o combined/ClickBeyondFrames-Combined.geode
        env:
          GEODE_SDK: ${{ env.GEODE_SDK }}

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-Combined
          path: combined/*.geode
