name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [android64, android32]

    env:
      GEODE_SDK: ${{ github.workspace }}/geode-sdk
      CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm-cache
      ANDROID_NDK_HOME: ${{ github.workspace }}/android-ndk-r28

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Setup dummy Geode profile
        run: |
          mkdir -p dummy_profile
          geode profile add --name dummy dummy_profile/GeometryDash.exe win

      - name: Install Geode SDK (5.7.1)
        run: |
          geode sdk install "$GEODE_SDK"
          geode sdk update 5.7.1
          # Install binaries for both ABIs (the CLI handles this automatically)
          geode sdk install-binaries --platform android --version 5.7.1

      - name: Debug - list binary directories
        run: |
          echo "Contents of $GEODE_SDK/binaries:"
          ls -laR $GEODE_SDK/binaries/ || echo "Directory not found"

      - name: Locate loader binary
        id: locate
        run: |
          # Search for libgeode_loader.so (Android loader)
          LOADER=$(find $GEODE_SDK/binaries -name "libgeode_loader.so" | head -n1)
          if [ -n "$LOADER" ]; then
            BIN_DIR=$(dirname "$LOADER")
            echo "Found loader at $LOADER"
            echo "GEODE_BINARY_DIR=$BIN_DIR" >> $GITHUB_ENV
            echo "BIN_DIR=$BIN_DIR" >> $GITHUB_OUTPUT
          else
            echo "Loader not found! Trying to find any .so file..."
            find $GEODE_SDK/binaries -name "*.so" | head -n5
            exit 1
          fi

      - name: Download Android NDK r28 (Clang 19+)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip -d ${{ github.workspace }}
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/android-ndk-r28" >> $GITHUB_ENV

      - name: Generate mod.json from template
        run: |
          export GEODE_VERSION="5.7.1"
          export MOD_ID="frostre1997.click-beyond-frames"
          export MOD_NAME="Click Beyond Frames"
          export MOD_VERSION="v1.0.0"
          export MOD_DEVELOPER="frostre1997"
          export MOD_DESCRIPTION="Removes the 480 TPS cap from RobTop's official CBF for unlimited input precision on Android."
          envsubst < mod.json.template > mod.json

      - name: Build mod
        run: |
          geode build -p ${{ matrix.platform }} --config Release --ndk "$ANDROID_NDK_HOME"
        env:
          GEODE_BINARY_DIR: ${{ env.GEODE_BINARY_DIR }}  # Pass the discovered path

      - name: Upload artifact (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/*.geode

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    env:
      GEODE_SDK: ${{ github.workspace }}/geode-sdk

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main
        with:
          version: latest

      - name: Setup dummy Geode profile
        run: |
          mkdir -p dummy_profile
          geode profile add --name dummy dummy_profile/GeometryDash.exe win

      - name: Install Geode SDK (5.7.1)
        run: |
          geode sdk install "$GEODE_SDK"
          geode sdk update 5.7.1
          geode sdk install-binaries --platform android --version 5.7.1

      - name: Combine .geode files
        run: |
          mkdir combined
          geode combine artifacts/ClickBeyondFrames-android64/*.geode artifacts/ClickBeyondFrames-android32/*.geode -o combined/ClickBeyondFrames-Combined.geode

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-Combined
          path: combined/*.geode
