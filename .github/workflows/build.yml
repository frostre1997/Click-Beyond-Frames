name: Build Geode Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [android-arm64, android-armv7a]  # v8a and v7a

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: ${{ matrix.target }}
          # Optional: add build-args if needed
          # build-args: '--config Release'

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-${{ matrix.target }}
          path: ${{ steps.build.outputs.build-output }}

  combine:
    name: Combine Builds
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    steps:
      - name: Combine .geode files
        uses: geode-sdk/build-geode-mod/combine@main
        id: combine

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickBeyondFrames-Combined
          path: ${{ steps.combine.outputs.build-output }}
